{% extends 'base.html' %}

{% block title %}
{{ news.title }}
{% endblock %}

{% block content %}

<h1>{{ news.title }}</h1>

<p class="text-muted">
    Дата публикации: {{ news.date }}
</p>

<hr>

<h5>Краткое описание</h5>

<p>
    {{ news.summary }}
</p>

<h5>Текст новости</h5>

<p>
    {{ news.content }}
</p>

<a href="{% url 'home' %}"
   class="btn btn-secondary mt-3">
    Назад
</a>

{% endblock %}
