{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>
        {% block title %}
        Новостной портал
        {% endblock %}
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

    {% block extra_css %}
    {% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand"
           href="{% url 'home' %}">
            Новостной портал
        </a>

        <div>
            <a href="{% url 'home' %}"
               class="btn btn-outline-light me-2">
                Главная
            </a>

            <a href="{% url 'add_news' %}"
               class="btn btn-success">
                Добавить новость
            </a>
        </div>

    </div>
</nav>

<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
